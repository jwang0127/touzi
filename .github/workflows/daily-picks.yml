name: Daily three-stock forecast

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate 09:00 Asia/Shanghai forecast
        run: node scripts/update-daily-picks.mjs
      - name: Publish changed forecast
        run: |
          if git diff --quiet -- docs/daily-picks.json public/daily-picks.json; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/daily-picks.json public/daily-picks.json
          git commit -m "update daily three-stock forecast"
          git push
